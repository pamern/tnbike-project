<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TNBIKE Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <div class="shell">
    <aside class="nav">
      <a class="brand" href="/">
        <span class="brand-mark">T</span>
        <span>TNBIKE Intelligence</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/" class="{{ 'active' if active == 'home' else '' }}">Control Center</a>
        <a href="/reports" class="{{ 'active' if active == 'reports' else '' }}">Reports</a>
        <a href="/settings" class="{{ 'active' if active == 'settings' else '' }}">Settings</a>
      </nav>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</body>
</html>
