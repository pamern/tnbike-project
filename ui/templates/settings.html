{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="page-head">
  <div>
    <p class="eyebrow">Runtime Settings</p>
    <h1>API Keys & Config</h1>
  </div>
  <span class="badge">{{ "keys loaded" if has_keys else "no keys in session" }}</span>
</section>

<form id="settings-form" class="panel form-grid">
  <label class="field wide">
    <span>GROQ_API_KEYS</span>
    <textarea name="groq_api_keys" rows="6" placeholder="Mỗi key một dòng"></textarea>
  </label>
  <label class="field">
    <span>LLM_MODEL</span>
    <select name="llm_model">
      <option value="llama-3.3-70b-versatile" {{ "selected" if llm_model == "llama-3.3-70b-versatile" else "" }}>llama-3.3-70b-versatile</option>
      <option value="llama-3.1-8b-instant" {{ "selected" if llm_model == "llama-3.1-8b-instant" else "" }}>llama-3.1-8b-instant</option>
    </select>
  </label>
  <label class="field"><span>PGHOST</span><input name="pghost" value="{{ config.get('PGHOST', '') }}" placeholder="localhost"></label>
  <label class="field"><span>PGPORT</span><input name="pgport" value="{{ config.get('PGPORT', '') }}" placeholder="5432"></label>
  <label class="field"><span>PGDATABASE</span><input name="pgdatabase" value="{{ config.get('PGDATABASE', '') }}" placeholder="tnbike_db"></label>
  <label class="field"><span>PGUSER</span><input name="pguser" value="{{ config.get('PGUSER', '') }}" placeholder="postgres"></label>
  <label class="field"><span>PGPASSWORD</span><input name="pgpassword" type="password" value="" placeholder="session password"></label>
  <label class="field"><span>DB_SCHEMA</span><input name="db_schema" value="{{ config.get('DB_SCHEMA', '') }}" placeholder="tnbike"></label>
  <p class="hint wide">Keys chỉ tồn tại trong phiên làm việc này. Tắt server = mất keys.</p>
  <div class="action-bar wide">
    <button type="submit" class="btn primary">Lưu session</button>
    <button type="button" id="test-db" class="btn secondary">Test kết nối DB</button>
    <button type="button" id="test-llm" class="btn secondary">Test LLM key</button>
  </div>
  <div id="settings-result" class="result wide"></div>
</form>
{% endblock %}
